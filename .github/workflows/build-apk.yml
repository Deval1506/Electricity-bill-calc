name: Build Debug APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:   # Allows you to run this manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up JDK 17 (required by AGP 8.2.2)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Install Gradle 8.2 (matches gradle-wrapper.properties)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      # 4. Build the debug APK
      - name: Build Debug APK
        run: gradle assembleDebug
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # 5. Upload APK as a downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ElectricityBillCalculator-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
